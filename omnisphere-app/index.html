<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Optimization -->
    <title>Omnisphere R18 | Next-Gen Uncensored Social Engine</title>
    <meta name="description" content="Secure, ad-free, zero-telemetry mature social engine where independent creators keep 95% of subscription earnings, protected from censorship." />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[Service Worker] Registered successfully:', reg.scope))
            .catch(err => console.error('[Service Worker] Registration failed:', err));
        });
      }
    </script>
  </body>
</html>
